name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        working-directory: utils-go/json-utils-go
        run: go mod download

      - name: Run tests
        working-directory: utils-go/json-utils-go
        run: go test ./...

      - name: Build
        working-directory: utils-go/json-utils-go
        run: go build ./...