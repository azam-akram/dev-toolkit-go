name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - utils-go/http-utils-go
          - utils-go/json-utils-go
    steps:
      - name: Check code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        working-directory: ${{ matrix.project }}
        run: go mod download
      
      - name: Vetting
        working-directory: ${{ matrix.project }}
        run: go vet ./...

      - name: Run tests
        working-directory: ${{ matrix.project }}
        run: go test ./...

      - name: Build
        working-directory: ${{ matrix.project }}
        run: go build ./...