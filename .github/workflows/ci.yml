name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - aws-apigateway-lambda-dynamo-go
          - aws-lambda-cron-go
          - aws-lambda-external-sns-topic-go/calculation-requester-lambda
          - aws-lambda-external-sns-topic-go/calculation-service-lambda
          - aws-lambda-mysql-rds-go
          - aws-lambda-sns-events-go
          - aws-scalable-containerized-service-go
          - aws-step-function-go
          - go-k8s-demo
          - kafka-docker-go/kafka-consumer
          - kafka-docker-go/kafka-producer
          - rest-api-gin-framework
          - utils-go/http-utils-go
          - utils-go/json-utils-go
    steps:
      - name: Check code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        working-directory: ${{ matrix.project }}
        run: go mod download
      
      - name: Vetting
        working-directory: ${{ matrix.project }}
        run: go vet ./...

      - name: Run tests
        working-directory: ${{ matrix.project }}
        run: go test ./...

      - name: Build
        working-directory: ${{ matrix.project }}
        run: go build ./...